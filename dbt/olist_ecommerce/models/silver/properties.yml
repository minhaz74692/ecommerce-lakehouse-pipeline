version: 2

models:
  - name: silver_customers #  Must match the filename of a model -- including case sensitivity.
    config:
      materialized: table
      schema: silver
      alias: customers
    
    columns:
      - name: customer_unique_id
        data_tests:
          - unique
          - not_null

  - name: silver_orders #  Must match the filename of a model -- including case sensitivity.
    config:
      materialized: table
      schema: silver
      alias: orders
    
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null

  - name: silver_order_items #  Must match the filename of a model -- including case sensitivity.
    config:
      materialized: table
      schema: silver
      alias: order_items

  - name: silver_products #  Must match the filename of a model -- including case sensitivity.
    config:
      materialized: table
      schema: silver
      alias: products
    
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null
          
  - name: silver_payments #  Must match the filename of a model -- including case sensitivity.
    config:
      materialized: table
      schema: silver
      alias: payments

    
  - name: silver_reviews #  Must match the filename of a model -- including case sensitivity.
    config:
      materialized: table
      schema: silver
      alias: reviews
    
    columns:
      - name: review_id
        data_tests:
          - unique
          - not_null
    
